<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turing Machine Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    h1 { color: #58a6ff; margin-bottom: 8px; font-size: 1.4em; }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .controls label { color: #8b949e; font-size: 0.85em; }
    .controls input, .controls select, .controls button {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85em;
    }
    .controls button {
      cursor: pointer;
      background: #21262d;
    }
    .controls button:hover { background: #30363d; }
    .controls button.active { background: #1f6feb; border-color: #58a6ff; }
    .status-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 0.85em;
    }
    .status-bar .label { color: #8b949e; }
    .status-bar .value { color: #58a6ff; font-weight: bold; }
    .status-bar .state { color: #3fb950; }
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-header {
      padding: 8px 16px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      font-size: 0.8em;
      color: #8b949e;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .panel-body {
      padding: 16px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.82em;
      line-height: 1.5;
    }
    .panel-body h1, .panel-body h2, .panel-body h3 {
      color: #58a6ff;
      margin: 12px 0 6px 0;
    }
    .panel-body h1 { font-size: 1.2em; }
    .panel-body h2 { font-size: 1em; color: #d2a8ff; }
    .panel-body h3 { font-size: 0.9em; color: #79c0ff; }
    .panel-body strong { color: #f0f6fc; }
    .full-width { grid-column: 1 / -1; }
    .timeline {
      display: flex;
      gap: 4px;
      padding: 16px;
      overflow-x: auto;
      align-items: flex-end;
    }
    .cycle-dot {
      min-width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .cycle-dot:hover { border-color: #58a6ff; transform: scale(1.1); }
    .cycle-dot.selected { border-color: #58a6ff; box-shadow: 0 0 8px rgba(88,166,255,0.3); }
    .cycle-dot.state-changed { background: #238636; color: #fff; }
    .cycle-dot.no-change { background: #30363d; color: #8b949e; }
    .cycle-dot.current { background: #1f6feb; color: #fff; }
    .diff-added { color: #3fb950; }
    .diff-removed { color: #f85149; }
    .legend {
      display: flex;
      gap: 16px;
      padding: 0 16px 12px 16px;
      font-size: 0.75em;
      color: #8b949e;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }
    .log-panel .panel-body {
      max-height: 300px;
      font-size: 0.78em;
      color: #8b949e;
    }
    .log-panel .panel-body .log-thinking { color: #d2a8ff; }
    .log-panel .panel-body .log-tool { color: #58a6ff; }
    .log-panel .panel-body .log-error { color: #f85149; }
    .log-panel .panel-body .log-retry { color: #d29922; }
    #instancePath { width: 300px; }
  </style>
</head>
<body>
  <h1>Turing Machine Visualizer</h1>
  <div class="controls">
    <label>Instance path:</label>
    <input type="text" id="instancePath" placeholder="instances/test-drive-3" />
    <button id="loadBtn" onclick="loadInstance()">Load</button>
    <button id="autoBtn" onclick="toggleAuto()">Auto-refresh</button>
    <label>Interval:</label>
    <select id="refreshInterval">
      <option value="2000">2s</option>
      <option value="5000" selected>5s</option>
      <option value="10000">10s</option>
      <option value="30000">30s</option>
    </select>
  </div>

  <div class="status-bar">
    <div><span class="label">Cycles: </span><span class="value" id="totalCycles">-</span></div>
    <div><span class="label">State: </span><span class="state" id="currentState">-</span></div>
    <div><span class="label">Last update: </span><span class="value" id="lastUpdate">-</span></div>
  </div>

  <div class="panel full-width" style="margin-bottom: 16px;">
    <div class="panel-header">Cycle Timeline</div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#238636"></span> State changed</span>
      <span><span class="legend-dot" style="background:#30363d"></span> No change</span>
      <span><span class="legend-dot" style="background:#1f6feb"></span> Current</span>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">Memory.md</div>
      <div class="panel-body" id="memoryPanel">Select a cycle or load an instance</div>
    </div>
    <div class="panel">
      <div class="panel-header">Instructions.md</div>
      <div class="panel-body" id="instructionsPanel">Select a cycle or load an instance</div>
    </div>
  </div>

  <div class="panel full-width log-panel">
    <div class="panel-header">Latest Log</div>
    <div class="panel-body" id="logPanel">No log loaded</div>
  </div>

  <script>
    let autoInterval = null;
    let instanceDir = '';
    let cycles = [];
    let selectedCycle = -1;

    async function readFile(path) {
      try {
        const resp = await fetch(path);
        if (!resp.ok) return null;
        return await resp.text();
      } catch { return null; }
    }

    // Since we can't read the filesystem from a browser, we use a local server approach.
    // This visualizer expects to be served from the project root.
    // It reads files via fetch from a simple file server.

    // For direct file:// usage, we load data from a JSON export.
    // The recommended approach: run `python3 -m http.server 8080` from the project root.

    function getState(memoryContent) {
      if (!memoryContent) return '?';
      const match = memoryContent.match(/^## State\n(.+)/m);
      return match ? match[1].trim() : '?';
    }

    function renderMarkdown(text) {
      if (!text) return '<em>empty</em>';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function colorizeLog(text) {
      if (!text) return '<em>No log available</em>';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^(.*\[thinking\].*)$/gm, '<span class="log-thinking">$1</span>')
        .replace(/^(.*\[(bash|write_file|update_instructions|claude-code|halt)\].*)$/gm, '<span class="log-tool">$1</span>')
        .replace(/^(.*\[error\].*)$/gm, '<span class="log-error">$1</span>')
        .replace(/^(.*\[retry\].*)$/gm, '<span class="log-retry">$1</span>');
    }

    async function loadInstance() {
      instanceDir = document.getElementById('instancePath').value.trim();
      if (!instanceDir) return;

      cycles = [];

      // List history directory to discover cycle folders (format: 0001-abcdef or 0001)
      const histResp = await fetch(`${instanceDir}/history/`);
      if (histResp.ok) {
        const html = await histResp.text();
        // Parse directory listing links — match folder names like 0001-abcdef/ or 0001/
        const dirMatches = html.match(/(\d{4}(?:-[a-f0-9]+)?)\//g);
        if (dirMatches) {
          const dirs = [...new Set(dirMatches)].map(d => d.replace(/\/$/, '')).sort();
          for (const dir of dirs) {
            const num = parseInt(dir.slice(0, 4), 10);
            const hash = dir.includes('-') ? dir.slice(5) : '';
            const mem = await readFile(`${instanceDir}/history/${dir}/MEMORY.md`);
            if (mem === null) continue;
            const inst = await readFile(`${instanceDir}/history/${dir}/INSTRUCTIONS.md`);
            cycles.push({ num, hash, dir, memory: mem, instructions: inst, state: getState(mem) });
          }
        }
      }

      // Also load current state
      const currentMem = await readFile(`${instanceDir}/MEMORY.md`);
      const currentInst = await readFile(`${instanceDir}/INSTRUCTIONS.md`);

      document.getElementById('totalCycles').textContent = cycles.length;
      document.getElementById('currentState').textContent = currentMem ? getState(currentMem) : '-';
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

      renderTimeline();

      // Show current state by default
      document.getElementById('memoryPanel').innerHTML = renderMarkdown(currentMem);
      document.getElementById('instructionsPanel').innerHTML = renderMarkdown(currentInst);

      // Load latest log
      await loadLatestLog();

      // Select last cycle
      if (cycles.length > 0) {
        selectCycle(cycles[cycles.length - 1].num);
      }
    }

    async function loadLatestLog() {
      // Try to find the most recent log file
      // Since we can't list directories from browser, we read current files
      const logPanel = document.getElementById('logPanel');

      // Try a known recent log - this is a best-effort approach
      // In practice, the log is in instanceDir/logs/
      let logContent = null;

      // Try fetching log listing via a simple approach
      const resp = await fetch(`${instanceDir}/logs/`);
      if (resp.ok) {
        const html = await resp.text();
        // Parse directory listing for log files
        const matches = html.match(/run-[^"<]+\.log/g);
        if (matches && matches.length > 0) {
          const latest = matches.sort().pop();
          logContent = await readFile(`${instanceDir}/logs/${latest}`);
        }
      }

      if (logContent) {
        // Show last 200 lines
        const lines = logContent.split('\n');
        const tail = lines.slice(-200).join('\n');
        logPanel.innerHTML = colorizeLog(tail);
        logPanel.scrollTop = logPanel.scrollHeight;
      } else {
        logPanel.innerHTML = '<em>No log files found. Serve with: python3 -m http.server 8080</em>';
      }
    }

    function renderTimeline() {
      const container = document.getElementById('timeline');
      container.innerHTML = '';

      let prevState = '';
      for (let idx = 0; idx < cycles.length; idx++) {
        const cycle = cycles[idx];
        const isLast = idx === cycles.length - 1;
        const dot = document.createElement('div');
        dot.className = 'cycle-dot';
        dot.textContent = cycle.num;
        dot.onclick = () => selectCycle(cycle.num);

        if (isLast) {
          dot.classList.add('current');
        } else if (cycle.state !== prevState) {
          dot.classList.add('state-changed');
        } else {
          dot.classList.add('no-change');
        }

        if (cycle.num === selectedCycle) {
          dot.classList.add('selected');
        }

        const hashLabel = cycle.hash ? ` (${cycle.hash})` : '';
        dot.title = `Cycle ${cycle.num}${hashLabel}: ${cycle.state}`;
        container.appendChild(dot);
        prevState = cycle.state;
      }

      // Scroll to end
      container.scrollLeft = container.scrollWidth;
    }

    function selectCycle(num) {
      selectedCycle = num;
      const cycle = cycles.find(c => c.num === num);
      if (!cycle) return;

      document.getElementById('memoryPanel').innerHTML = renderMarkdown(cycle.memory);
      document.getElementById('instructionsPanel').innerHTML = renderMarkdown(cycle.instructions);
      document.getElementById('currentState').textContent = cycle.state + (cycle.hash ? ` (${cycle.hash})` : '');

      renderTimeline();
    }

    function toggleAuto() {
      const btn = document.getElementById('autoBtn');
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.classList.remove('active');
        btn.textContent = 'Auto-refresh';
      } else {
        const ms = parseInt(document.getElementById('refreshInterval').value);
        autoInterval = setInterval(loadInstance, ms);
        btn.classList.add('active');
        btn.textContent = 'Stop';
      }
    }

    // Auto-load if URL has ?instance= parameter
    const params = new URLSearchParams(window.location.search);
    const inst = params.get('instance');
    if (inst) {
      document.getElementById('instancePath').value = inst;
      loadInstance();
    }
  </script>
</body>
</html>
