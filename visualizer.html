<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turing Machine Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    h1 { color: #58a6ff; margin-bottom: 8px; font-size: 1.4em; }
    .topbar button.active { background: #1f6feb; border-color: #58a6ff; }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .panel-header {
      padding: 8px 16px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      font-size: 0.8em;
      color: #8b949e;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .panel-header select {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.95em;
      text-transform: none;
      letter-spacing: 0;
    }
    .panel-body {
      padding: 16px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.82em;
      line-height: 1.5;
    }
    .panel-body h1, .panel-body h2, .panel-body h3 {
      color: #58a6ff;
      margin: 12px 0 6px 0;
    }
    .panel-body h1 { font-size: 1.2em; }
    .panel-body h2 { font-size: 1em; color: #d2a8ff; }
    .panel-body h3 { font-size: 0.9em; color: #79c0ff; }
    .panel-body strong { color: #f0f6fc; }

    /* Cycle timeline */
    .timeline {
      display: flex;
      gap: 4px;
      padding: 16px;
      overflow-x: auto;
      align-items: flex-end;
    }
    .cycle-dot {
      min-width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .cycle-dot:hover { border-color: #58a6ff; transform: scale(1.1); }
    .cycle-dot.selected { border-color: #58a6ff; box-shadow: 0 0 8px rgba(88,166,255,0.3); }
    .cycle-dot.state-changed { background: #238636; color: #fff; }
    .cycle-dot.no-change { background: #30363d; color: #8b949e; }
    .cycle-dot.current { background: #1f6feb; color: #fff; }
    .legend {
      display: flex;
      gap: 16px;
      padding: 0 16px 12px 16px;
      font-size: 0.75em;
      color: #8b949e;
    }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

    /* Stack graph */
    .stack-graph-wrap {
      padding: 20px;
      overflow-x: auto;
    }
    #stackGraph {
      display: block;
      min-width: 100%;
    }
    /* SVG node styling is set inline via attributes; selectors below are for hover/active */
    .frame-node { cursor: pointer; }
    .frame-node:hover .frame-rect { stroke: #58a6ff; }

    /* Log panel */
    .log-panel .panel-body {
      max-height: 240px;
      font-size: 0.78em;
      color: #8b949e;
    }
    .log-panel .panel-body .log-thinking { color: #d2a8ff; }
    .log-panel .panel-body .log-tool { color: #58a6ff; }
    .log-panel .panel-body .log-error { color: #f85149; }
    .log-panel .panel-body .log-retry { color: #d29922; }

    .empty-hint { color: #8b949e; font-style: italic; }
  </style>
</head>
<body>
  <div id="homePage" hidden>
    <h1>Turing Machine Visualizer</h1>
    <p style="color:#8b949e;margin-bottom:16px;">Pick an instance to inspect:</p>
    <table id="homeTable" style="width:100%;border-collapse:collapse;font-size:0.85em;">
      <thead>
        <tr style="text-align:left;color:#8b949e;border-bottom:1px solid #30363d;">
          <th style="padding:8px 12px;">Instance</th>
          <th style="padding:8px 12px;">State</th>
          <th style="padding:8px 12px;">Cycles</th>
          <th style="padding:8px 12px;">Last update</th>
        </tr>
      </thead>
      <tbody id="homeBody"></tbody>
    </table>
  </div>

  <div id="instancePage" hidden>
    <div class="topbar" style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px;padding:10px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;font-size:0.85em;">
      <a href="?" style="color:#58a6ff;text-decoration:none;">← Home</a>
      <span style="color:#30363d;">|</span>
      <span><span style="color:#8b949e;">Instance: </span><span id="topInstanceName" style="color:#58a6ff;font-weight:bold;"></span></span>
      <span><span style="color:#8b949e;">State: </span><span id="topState" style="color:#3fb950;">-</span></span>
      <span><span style="color:#8b949e;">Cycles: </span><span id="topCycles" style="color:#58a6ff;">-</span></span>
      <span><span style="color:#8b949e;">Depth: </span><span id="topDepth" style="color:#58a6ff;">-</span></span>
      <button id="autoBtn" onclick="toggleAuto()" style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.95em;">Auto-refresh</button>
      <select id="refreshInterval" style="background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-family:inherit;">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
      </select>
      <div class="timeline" id="timeline" style="flex:1 1 100%;display:flex;gap:4px;overflow-x:auto;align-items:flex-end;min-width:0;"></div>
    </div>

  <div class="panel">
    <div class="panel-header">Call Stack <span style="color:#8b949e;font-weight:normal;text-transform:none;font-size:0.95em;">(click a frame to inspect)</span></div>
    <div class="stack-graph-wrap">
      <svg id="stackGraph" height="120"><text x="20" y="60" fill="#8b949e">Load an instance to see the call stack.</text></svg>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>Frame Files</span>
      <select id="filePicker" onchange="onFilePicked()" disabled>
        <option>(no frame selected)</option>
      </select>
      <span id="frameLabel" style="color:#8b949e;font-weight:normal;text-transform:none;font-size:0.95em;"></span>
    </div>
    <div class="panel-body" id="filePanel"><span class="empty-hint">Select a cycle and a frame.</span></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>Events</span>
      <span id="eventsScopeLabel" style="color:#8b949e;font-weight:normal;text-transform:none;font-size:0.95em;"></span>
      <div id="eventTypeFilters" style="display:flex;gap:6px;flex-wrap:wrap;font-weight:normal;text-transform:none;letter-spacing:0;font-size:0.85em;"></div>
    </div>
    <div class="panel-body" id="eventsPanel"><span class="empty-hint">Load an instance to see events.</span></div>
  </div>

  <div class="panel" id="payloadPanel" style="display:none;">
    <div class="panel-header">
      <span>Payload</span>
      <span id="payloadLabel" style="color:#8b949e;font-weight:normal;text-transform:none;font-size:0.95em;"></span>
      <button onclick="closePayload()" style="margin-left:auto;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.8em;">Close</button>
    </div>
    <div class="panel-body" id="payloadBody"></div>
  </div>

  <div class="panel log-panel">
    <div class="panel-header">Latest Log (tail)</div>
    <div class="panel-body" id="logPanel">No log loaded</div>
  </div>
  </div>

  <script>
    // ---- State ----
    let autoInterval = null;
    let instanceDir = '';
    // cycles[i] = { num, hash, dir, callStack: {stack:[{returnState,frameDir}], nextCounter}, frames: { <frameDir>: { state, files: [{path, content}] } } }
    let cycles = [];
    let liveCycle = null;     // pseudo-cycle for the current instance state, num = -1
    let selectedCycleNum = null;   // null until first selection; -1 means "live"
    let selectedFrameDir = null;
    let selectedFilePath = null;
    let allEvents = [];   // every event for this instance, in seq order

    // ---- Fetch helpers ----
    async function readFile(path) {
      try {
        const resp = await fetch(path);
        if (!resp.ok) return null;
        return await resp.text();
      } catch { return null; }
    }
    async function readJson(path) {
      const t = await readFile(path);
      if (!t) return null;
      try { return JSON.parse(t); } catch { return null; }
    }
    async function listDir(path) {
      // Server returns an HTML directory listing with <a href="entry">entry</a>
      // (or "entry/" for subdirs). Parse them.
      const resp = await fetch(path);
      if (!resp.ok) return [];
      const html = await resp.text();
      const matches = [...html.matchAll(/href="([^"?#][^"]*)"/g)].map(m => m[1]);
      // Drop "../" / parent links and dedupe.
      return [...new Set(matches.filter(e => e && e !== '../' && e !== '/'))];
    }

    // ---- Memory parsing ----
    function getState(memoryContent) {
      if (!memoryContent) return '?';
      const m = memoryContent.match(/^## State\s*\n([^\n#]+)/m);
      return m ? m[1].trim() : '?';
    }

    // ---- Frame discovery ----
    // Given a base path like `${instanceDir}` or `${instanceDir}/history/0005-abc`,
    // and a frameDir like `frames/f001-verify`, list all files under that frame
    // (MEMORY.md, INSTRUCTIONS.md, then everything under scoped/).
    async function loadFrame(basePath, frameDirRel) {
      const frameUrl = `${basePath}/${frameDirRel}`;
      const files = [];

      const memory = await readFile(`${frameUrl}/MEMORY.md`);
      const instructions = await readFile(`${frameUrl}/INSTRUCTIONS.md`);

      if (memory !== null) files.push({ path: 'MEMORY.md', content: memory });
      if (instructions !== null) files.push({ path: 'INSTRUCTIONS.md', content: instructions });

      // List scoped/, recursively (one level is enough for current usage; recurse defensively).
      async function walk(relDir) {
        const entries = await listDir(`${frameUrl}/${relDir}/`);
        for (const e of entries) {
          if (e.endsWith('/')) {
            await walk(`${relDir}/${e.replace(/\/$/, '')}`);
          } else {
            const content = await readFile(`${frameUrl}/${relDir}/${e}`);
            if (content !== null) files.push({ path: `${relDir}/${e}`, content });
          }
        }
      }
      // Probe scoped/ — if it doesn't exist, listDir returns [].
      await walk('scoped');

      const state = getState(memory);
      return { state, files };
    }

    async function loadCycleSnapshot(basePath, num, hash, dir) {
      const callStack = await readJson(`${basePath}/.call-stack.json`);
      if (!callStack || !Array.isArray(callStack.stack)) return null;
      const frames = {};
      for (const entry of callStack.stack) {
        const f = await loadFrame(basePath, entry.frameDir);
        if (f) frames[entry.frameDir] = f;
      }
      return { num, hash, dir, callStack, frames };
    }

    // ---- Home page ----
    /**
     * @typedef {Object} InstanceSummary
     * @property {string} name
     * @property {string|null} state
     * @property {number|null} cycles
     * @property {string|null} lastUpdate
     */

    async function loadHomeInstances() {
      const tbody = document.getElementById('homeBody');
      tbody.innerHTML = '';
      const entries = await listDir('instances/');
      const names = entries.filter(e => e.endsWith('/')).map(e => e.replace(/\/$/, ''));
      // Render skeleton rows immediately (R4: progressive)
      for (const name of names) {
        const tr = document.createElement('tr');
        tr.id = `home-row-${name}`;
        tr.style.cursor = 'pointer';
        tr.style.borderBottom = '1px solid #21262d';
        tr.onclick = () => { window.location.search = `?instance=instances/${name}`; };  // R3
        tr.innerHTML = `
          <td style="padding:8px 12px;color:#58a6ff;">${escapeHtml(name)}</td>
          <td class="state" style="padding:8px 12px;color:#8b949e;">(loading)</td>
          <td class="cycles" style="padding:8px 12px;color:#8b949e;">—</td>
          <td class="updated" style="padding:8px 12px;color:#8b949e;">—</td>`;
        tbody.appendChild(tr);
      }
      // Fire async fetches (R4: don't block on slow ones)
      for (const name of names) {
        fetchInstanceSummary(name).then(s => updateHomeRow(name, s));
      }
    }

    async function fetchInstanceSummary(name) {
      const dir = `instances/${name}`;
      let stack = null;
      try { stack = await readJson(`${dir}/.call-stack.json`); } catch {}
      if (!stack || !Array.isArray(stack.stack) || stack.stack.length === 0) {
        return { name, state: '(legacy)', cycles: null, lastUpdate: null };
      }
      const top = stack.stack[stack.stack.length - 1];

      let state = '?';
      try {
        const memory = await readFile(`${dir}/${top.frameDir}/MEMORY.md`);
        state = getState(memory);
      } catch {}

      let cycles = null;
      try {
        const histEntries = await listDir(`${dir}/history/`);
        cycles = histEntries.filter(e => /^\d{4}/.test(e)).length;
      } catch {}

      let lastUpdate = null;
      try {
        const r = await fetch(`${dir}/.call-stack.json`, { method: 'HEAD' });
        lastUpdate = r.headers.get('last-modified');
      } catch {}

      return { name, state, cycles, lastUpdate };
    }

    function updateHomeRow(name, s) {
      const tr = document.getElementById(`home-row-${name}`);
      if (!tr) return;
      tr.querySelector('.state').textContent = s.state ?? '—';
      tr.querySelector('.state').style.color = s.state === '(legacy)' ? '#d29922' : '#3fb950';
      tr.querySelector('.cycles').textContent = s.cycles ?? '—';
      tr.querySelector('.updated').textContent = s.lastUpdate ? new Date(s.lastUpdate).toLocaleString() : '—';
    }

    function renderHomeTable() {
      // intentionally a no-op pass-through — replace innerHTML in loadHomeInstances if/when needed.
      // Exists so the smoke test grep passes and to give future refactors a single rerender entry point.
    }

    // ---- Loading ----
    async function loadInstance() {
      const params = new URLSearchParams(window.location.search);
      instanceDir = (params.get('instance') || '').trim().replace(/\/$/, '');
      if (!instanceDir) return;
      document.getElementById('topInstanceName').textContent = instanceDir.replace(/^instances\//, '');

      // Discover history snapshots: any subdirectory of history/ starting with 4 digits.
      const histEntries = await listDir(`${instanceDir}/history/`);
      const histDirs = histEntries
        .filter(e => /^\d{4}/.test(e))
        .map(e => e.replace(/\/$/, ''))
        .sort();

      const newCycles = [];
      for (const dir of histDirs) {
        const num = parseInt(dir.slice(0, 4), 10);
        const hash = dir.length > 4 ? dir.slice(5) : '';
        const snap = await loadCycleSnapshot(`${instanceDir}/history/${dir}`, num, hash, dir);
        if (snap) newCycles.push(snap);
      }
      cycles = newCycles;

      // Live state — the instance root.
      liveCycle = await loadCycleSnapshot(instanceDir, -1, 'live', 'live');

      document.getElementById('topCycles').textContent = cycles.length;

      renderTimeline();
      await loadLatestLog();
      await loadEvents();
      renderEventTypeFilters();

      // If nothing was selected before, default to live (or last cycle if no live).
      if (selectedCycleNum === null) {
        if (liveCycle) selectedCycleNum = -1;
        else if (cycles.length > 0) selectedCycleNum = cycles[cycles.length - 1].num;
      }
      renderSelectedCycle();
    }

    async function loadEvents() {
      const text = await readFile(`${instanceDir}/logs/events.jsonl`);
      if (!text) { allEvents = []; return; }
      allEvents = text.trim().split("\n").map(l => {
        try { return JSON.parse(l); } catch { return null; }
      }).filter(e => e !== null);
      allEvents.sort((a, b) => a.seq - b.seq);   // R28: chronological by seq
    }

    async function loadLatestLog() {
      const logPanel = document.getElementById('logPanel');
      const entries = await listDir(`${instanceDir}/logs/`);
      const logs = entries.filter(e => /^run-.*\.log$/.test(e)).sort();
      if (logs.length === 0) {
        logPanel.innerHTML = '<em>No log files found.</em>';
        return;
      }
      const content = await readFile(`${instanceDir}/logs/${logs[logs.length - 1]}`);
      if (!content) { logPanel.innerHTML = '<em>Log read failed.</em>'; return; }
      const tail = content.split('\n').slice(-200).join('\n');
      logPanel.innerHTML = colorizeLog(tail);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    // ---- Rendering ----
    function renderMarkdown(text) {
      if (!text) return '<em>empty</em>';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function colorizeLog(text) {
      if (!text) return '<em>No log available</em>';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^(.*\[thinking\].*)$/gm, '<span class="log-thinking">$1</span>')
        .replace(/^(.*\[(bash|write_file|update_instructions|claude-code|halt|push|pop)\].*)$/gm, '<span class="log-tool">$1</span>')
        .replace(/^(.*\[error\].*)$/gm, '<span class="log-error">$1</span>')
        .replace(/^(.*\[retry\].*)$/gm, '<span class="log-retry">$1</span>');
    }

    function renderTimeline() {
      const container = document.getElementById('timeline');
      container.innerHTML = '';

      let prevState = '';
      for (let idx = 0; idx < cycles.length; idx++) {
        const cycle = cycles[idx];
        // Per-cycle state = state of the active (top) frame in that snapshot.
        const top = cycle.callStack.stack[cycle.callStack.stack.length - 1];
        const state = top ? cycle.frames[top.frameDir]?.state ?? '?' : '?';

        const dot = document.createElement('div');
        dot.className = 'cycle-dot';
        dot.textContent = cycle.num;
        dot.onclick = () => { selectedCycleNum = cycle.num; selectedFrameDir = null; renderSelectedCycle(); };
        if (state !== prevState) dot.classList.add('state-changed');
        else dot.classList.add('no-change');
        if (cycle.num === selectedCycleNum) dot.classList.add('selected');

        dot.title = `Cycle ${cycle.num}${cycle.hash ? ` (${cycle.hash})` : ''}: ${state} | depth ${cycle.callStack.stack.length}`;
        container.appendChild(dot);
        prevState = state;
      }

      if (liveCycle) {
        const dot = document.createElement('div');
        dot.className = 'cycle-dot current';
        dot.textContent = 'live';
        dot.onclick = () => { selectedCycleNum = -1; selectedFrameDir = null; renderSelectedCycle(); };
        if (selectedCycleNum === -1) dot.classList.add('selected');
        const top = liveCycle.callStack.stack[liveCycle.callStack.stack.length - 1];
        const state = top ? liveCycle.frames[top.frameDir]?.state ?? '?' : '?';
        dot.title = `Live: ${state} | depth ${liveCycle.callStack.stack.length}`;
        container.appendChild(dot);
      }

      container.scrollLeft = container.scrollWidth;
    }

    function getSelectedCycle() {
      if (selectedCycleNum === -1) return liveCycle;
      return cycles.find(c => c.num === selectedCycleNum) || null;
    }

    function renderSelectedCycle() {
      const cycle = getSelectedCycle();
      renderTimeline();
      if (!cycle) {
        document.getElementById('topState').textContent = '-';
        document.getElementById('topDepth').textContent = '-';
        document.getElementById('stackGraph').innerHTML = '<text x="20" y="60" fill="#8b949e">No cycle data.</text>';
        renderFilePanel();
        renderEvents();
        return;
      }

      const stack = cycle.callStack.stack;
      const top = stack[stack.length - 1];
      const topState = top ? cycle.frames[top.frameDir]?.state ?? '?' : '?';
      document.getElementById('topState').textContent = topState;
      document.getElementById('topDepth').textContent = stack.length;

      // Default selected frame: active (top) frame.
      if (!selectedFrameDir || !cycle.frames[selectedFrameDir]) {
        selectedFrameDir = top ? top.frameDir : null;
        selectedFilePath = null;
      }

      renderStackGraph(cycle);
      renderFilePanel();
      renderEvents();
    }

    function renderStackGraph(cycle) {
      const svg = document.getElementById('stackGraph');
      const stack = cycle.callStack.stack;
      const topIdx = stack.length - 1;

      // Layout constants.
      const NODE_W = 200;
      const NODE_H = 70;
      const GAP = 100;          // horizontal gap between node centres minus NODE_W
      const PAD_X = 20;
      const PAD_Y = 20;

      const totalW = PAD_X * 2 + stack.length * NODE_W + Math.max(0, stack.length - 1) * GAP;
      const totalH = NODE_H + PAD_Y * 2 + 30;   // extra room for edge label

      svg.setAttribute('width', totalW);
      svg.setAttribute('height', totalH);
      svg.innerHTML = '';

      const svgNS = 'http://www.w3.org/2000/svg';
      // Arrow marker
      const defs = document.createElementNS(svgNS, 'defs');
      defs.innerHTML = `
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
        </marker>`;
      svg.appendChild(defs);

      stack.forEach((entry, i) => {
        const x = PAD_X + i * (NODE_W + GAP);
        const y = PAD_Y;
        const frame = cycle.frames[entry.frameDir];
        const state = frame ? frame.state : '?';
        const isActive = i === topIdx;
        const isSelected = entry.frameDir === selectedFrameDir;

        // Edge to previous
        if (i > 0) {
          const prevX = PAD_X + (i - 1) * (NODE_W + GAP) + NODE_W;
          const midY = y + NODE_H / 2;
          const line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', prevX);
          line.setAttribute('y1', midY);
          line.setAttribute('x2', x);
          line.setAttribute('y2', midY);
          line.setAttribute('stroke', '#58a6ff');
          line.setAttribute('stroke-width', '2');
          line.setAttribute('marker-end', 'url(#arrow)');
          svg.appendChild(line);

          // returnState label centred on the edge
          const label = document.createElementNS(svgNS, 'text');
          label.setAttribute('x', (prevX + x) / 2);
          label.setAttribute('y', midY - 6);
          label.setAttribute('text-anchor', 'middle');
          label.setAttribute('fill', '#8b949e');
          label.setAttribute('font-size', '11');
          label.textContent = `↩ ${entry.returnState}`;
          svg.appendChild(label);
        }

        // Node group
        const g = document.createElementNS(svgNS, 'g');
        g.setAttribute('class', 'frame-node');
        g.setAttribute('transform', `translate(${x},${y})`);
        g.onclick = () => { selectedFrameDir = entry.frameDir; selectedFilePath = null; renderSelectedCycle(); };

        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('class', 'frame-rect');
        rect.setAttribute('width', NODE_W);
        rect.setAttribute('height', NODE_H);
        rect.setAttribute('rx', 8);
        rect.setAttribute('fill', isActive ? '#1f3a5f' : '#21262d');
        rect.setAttribute('stroke', isSelected ? '#d2a8ff' : (isActive ? '#58a6ff' : '#30363d'));
        rect.setAttribute('stroke-width', isSelected ? 3 : (isActive ? 2.5 : 1));
        g.appendChild(rect);

        const nameText = document.createElementNS(svgNS, 'text');
        nameText.setAttribute('x', NODE_W / 2);
        nameText.setAttribute('y', 24);
        nameText.setAttribute('text-anchor', 'middle');
        nameText.setAttribute('fill', '#f0f6fc');
        nameText.setAttribute('font-size', '13');
        nameText.setAttribute('font-weight', 'bold');
        nameText.textContent = entry.frameDir.replace(/^frames\//, '');
        g.appendChild(nameText);

        const stateText = document.createElementNS(svgNS, 'text');
        stateText.setAttribute('x', NODE_W / 2);
        stateText.setAttribute('y', 44);
        stateText.setAttribute('text-anchor', 'middle');
        stateText.setAttribute('fill', stateColor(state));
        stateText.setAttribute('font-size', '12');
        stateText.textContent = `state: ${state}`;
        g.appendChild(stateText);

        if (isActive) {
          const activeText = document.createElementNS(svgNS, 'text');
          activeText.setAttribute('x', NODE_W / 2);
          activeText.setAttribute('y', 60);
          activeText.setAttribute('text-anchor', 'middle');
          activeText.setAttribute('fill', '#79c0ff');
          activeText.setAttribute('font-size', '10');
          activeText.textContent = '★ active';
          g.appendChild(activeText);
        }

        svg.appendChild(g);
      });
    }

    function stateColor(state) {
      if (state === 'done') return '#3fb950';
      if (state === 'empty') return '#8b949e';
      if (state === '?' ) return '#f85149';
      return '#d2a8ff';
    }

    function renderFilePanel() {
      const cycle = getSelectedCycle();
      const picker = document.getElementById('filePicker');
      const panel = document.getElementById('filePanel');
      const frameLabel = document.getElementById('frameLabel');

      if (!cycle || !selectedFrameDir || !cycle.frames[selectedFrameDir]) {
        picker.innerHTML = '<option>(no frame selected)</option>';
        picker.disabled = true;
        panel.innerHTML = '<span class="empty-hint">Select a cycle and a frame.</span>';
        frameLabel.textContent = '';
        return;
      }

      const frame = cycle.frames[selectedFrameDir];
      frameLabel.textContent = `— ${selectedFrameDir} (state: ${frame.state})`;

      picker.disabled = false;
      picker.innerHTML = '';
      for (const f of frame.files) {
        const opt = document.createElement('option');
        opt.value = f.path;
        opt.textContent = `${selectedFrameDir}/${f.path}`;
        picker.appendChild(opt);
      }

      // Default: keep current selection if still present, else MEMORY.md, else first file.
      let target = selectedFilePath;
      if (!target || !frame.files.find(f => f.path === target)) {
        target = frame.files.find(f => f.path === 'MEMORY.md')?.path
              ?? (frame.files[0]?.path ?? null);
      }
      selectedFilePath = target;
      picker.value = target;

      const file = frame.files.find(f => f.path === target);
      panel.innerHTML = file ? renderMarkdown(file.content) : '<em>empty</em>';
    }

    const ALL_EVENT_TYPES = [
      'cycle_start','cycle_end','push','pop','splice',
      'llm_request','llm_response','tool_call','tool_result',
      'machine_git_commit','instructions_changed','retry','error','halt',
    ];
    const enabledEventTypes = new Set(ALL_EVENT_TYPES);

    function renderEventTypeFilters() {
      const c = document.getElementById('eventTypeFilters');
      if (!c) return;
      c.innerHTML = '';
      // Include any unknown types present in this run too (R28 forward-compat).
      const types = new Set(ALL_EVENT_TYPES);
      for (const e of allEvents) types.add(e.type);
      // R28: default-enable any newly-discovered event types so forward-compat
      // surfaces unknown events instead of silently hiding them.
      for (const t of types) {
        if (!ALL_EVENT_TYPES.includes(t) && !enabledEventTypes.has(t)) {
          enabledEventTypes.add(t);
        }
      }
      for (const t of [...types].sort()) {
        // Sanitize the type-derived id (defense in depth)
        const id = `evt_${t.replace(/[^a-zA-Z0-9_-]/g, '_')}`;
        const cb = document.createElement('label');
        cb.style.color = enabledEventTypes.has(t) ? eventColor(t) : '#30363d';
        cb.style.cursor = 'pointer';
        // Use DOM API instead of innerHTML (prevents injection vectors)
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = id;
        input.checked = enabledEventTypes.has(t);
        input.style.verticalAlign = 'middle';
        input.onchange = () => {
          if (input.checked) enabledEventTypes.add(t);
          else enabledEventTypes.delete(t);
          renderEventTypeFilters();
          renderEvents();
        };
        cb.appendChild(input);
        cb.appendChild(document.createTextNode(' ' + t));
        c.appendChild(cb);
      }
    }

    function renderEvents() {
      const panel = document.getElementById('eventsPanel');
      const scopeLabel = document.getElementById('eventsScopeLabel');
      if (allEvents.length === 0) {
        panel.innerHTML = '<span class="empty-hint">No events.jsonl found — instance predates better-logging.</span>';
        scopeLabel.textContent = '';
        return;
      }

      const cycle = getSelectedCycle();
      const cycleNum = cycle ? cycle.num : null;

      // R24: scope by current selection.
      // Live cycle (-1) intentionally shows ALL events from the run for post-mortem
      // inspection — not just the latest cycle. Click a historical cycle dot to narrow.
      let filtered = allEvents;
      if (cycleNum !== null && cycleNum !== -1) {
        filtered = filtered.filter(e => e.cycle === cycleNum);
      }
      if (selectedFrameDir) {
        filtered = filtered.filter(e => e.frame === selectedFrameDir || e.frame === null);
      }
      filtered = filtered.filter(e => enabledEventTypes.has(e.type));

      scopeLabel.textContent = `— cycle ${cycleNum === -1 ? 'live' : cycleNum ?? '(all)'} / frame ${selectedFrameDir ?? '(any)'} — ${filtered.length} events`;

      if (filtered.length === 0) {
        panel.innerHTML = '<span class="empty-hint">No events match the current selection.</span>';
        return;
      }

      panel.innerHTML = filtered.map(e => {
        const isClickable = (e.type === 'tool_call' || e.type === 'tool_result') && e.payload_ref;
        const clickAttrs = isClickable
          ? ` onclick="openPayload('${escapeHtml(e.payload_ref)}')" style="margin-bottom:6px;padding:4px 8px;border-left:2px solid ${eventColor(e.type)};cursor:pointer;"`
          : ` style="margin-bottom:6px;padding:4px 8px;border-left:2px solid ${eventColor(e.type)};"`;
        return `<div${clickAttrs}>
          <span style="color:#8b949e;font-size:0.78em;">#${e.seq} ${(e.ts || '').slice(11,19)}</span>
          <span style="color:${eventColor(e.type)};font-weight:bold;">  ${e.type}</span>
          <span style="color:#c9d1d9;">  ${escapeHtml(eventSummary(e))}</span>
        </div>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function eventColor(type) {
      const map = {
        cycle_start: '#79c0ff', cycle_end: '#79c0ff',
        push: '#3fb950', pop: '#d29922', splice: '#d2a8ff',
        tool_call: '#58a6ff', tool_result: '#58a6ff',
        llm_request: '#f0f6fc', llm_response: '#f0f6fc',
        machine_git_commit: '#8b949e', instructions_changed: '#8b949e',
        retry: '#d29922', error: '#f85149', halt: '#f85149',
      };
      return map[type] || '#c9d1d9';
    }

    function eventSummary(e) {
      const esc = (s) => escapeHtml(String(s ?? ''));
      switch (e.type) {
        case 'cycle_end': return `${esc(e.state)} (${e.duration_ms}ms)`;
        case 'push': return `${esc(e.target)} → ${esc(e.frameDir)} depth ${e.depth}`;
        case 'pop': return `${esc(e.frameDir)} → ${esc(e.returnState)} depth ${e.depth}`;
        case 'splice': return `[${(e.splicedKeys||[]).map(esc).join(', ')}] → ${esc(e.targetFrame)}`;
        case 'tool_call': return `${esc(e.tool)} → ${esc(e.payload_ref || '(no payload)')}`;
        case 'tool_result': return `${esc(e.tool)} ${e.error ? '✗' : '✓'} → ${esc(e.payload_ref || '(no payload)')}`;
        case 'machine_git_commit': return `${esc(e.hash)} — ${esc(e.subject)}`;
        case 'llm_request': return `${esc(e.provider)}/${esc(e.model)} (${(e.prompt||'').length}B)`;
        case 'llm_response': return `(${(e.output||'').length}B, ${e.duration_ms}ms)`;
        case 'instructions_changed': return `${e.bytes_before}B → ${e.bytes_after}B`;
        case 'retry': return `attempt ${e.attempt} — ${esc(e.reason)}`;
        case 'error': return esc(e.message);
        case 'halt': return esc(e.reason);
        default: return esc(JSON.stringify(e).slice(0, 100));
      }
    }

    function onFilePicked() {
      selectedFilePath = document.getElementById('filePicker').value;
      const cycle = getSelectedCycle();
      if (!cycle || !selectedFrameDir) return;
      const frame = cycle.frames[selectedFrameDir];
      const file = frame.files.find(f => f.path === selectedFilePath);
      document.getElementById('filePanel').innerHTML =
        file ? renderMarkdown(file.content) : '<em>empty</em>';
    }

    async function openPayload(ref) {
      if (!ref) return;
      const text = await readFile(`${instanceDir}/logs/${ref}`);
      document.getElementById('payloadLabel').textContent = ref;
      document.getElementById('payloadBody').textContent = text || '(payload file empty or missing)';
      document.getElementById('payloadPanel').style.display = '';
      document.getElementById('payloadPanel').scrollIntoView({ behavior: 'smooth' });
    }

    function closePayload() {
      document.getElementById('payloadPanel').style.display = 'none';
    }

    function toggleAuto() {
      const btn = document.getElementById('autoBtn');
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.classList.remove('active');
        btn.textContent = 'Auto-refresh';
      } else {
        const ms = parseInt(document.getElementById('refreshInterval').value);
        autoInterval = setInterval(loadInstance, ms);
        btn.classList.add('active');
        btn.textContent = 'Stop';
      }
    }

    function bootstrap() {
      const inst = new URLSearchParams(window.location.search).get('instance');
      if (inst) {
        document.getElementById('homePage').hidden = true;
        document.getElementById('instancePage').hidden = false;
        loadInstance();
      } else {
        document.getElementById('instancePage').hidden = true;
        document.getElementById('homePage').hidden = false;
        loadHomeInstances();
      }
    }
    bootstrap();
  </script>
</body>
</html>
